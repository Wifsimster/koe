name: Deploy — homelab

# Runs on the self-hosted runner alongside the target docker host. Fires
# after the upstream image-publishing workflow succeeds on main, pulls
# `:latest`, reconciles the compose stack, and prunes dangling images.
# Replaces Watchtower — deploys are now observable in the Actions log.

on:
  workflow_run:
    workflows: ["Server image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-homelab-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Pull & reconcile
    runs-on: [self-hosted]
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: /opt/docker/koe
    steps:
      # Self-hosted runners don't persist GHCR credentials across jobs,
      # and the host docker daemon may have never been logged in. Without
      # this step, `docker compose pull` fails fast with 401/404 the first
      # time the image is fetched (or after the cached token expires).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull only the api service. The db service uses `postgres:16-alpine`
      # from Docker Hub, which is subject to anonymous pull rate limits
      # (100/6h/IP) — pulling it every deploy risks throttling and offers
      # no benefit since only the api image changes between runs.
      - name: Pull latest api image
        run: docker compose pull api

      - name: Reconcile stack
        run: docker compose up -d

      - name: Show status
        run: docker compose ps

      - name: Prune dangling images
        if: success()
        working-directory: /
        run: docker image prune -f
