name: Server image

# Publishes `ghcr.io/wifsimster/koe-server`. This image bundles the
# Hono API and the built admin dashboard SPA (served at `/admin/*`) —
# the complete self-hostable Koe runtime.
#
# Triggers:
#   - Push to `main`               → `:edge` + `:sha-<short>` (rolling)
#   - Push of `server-v*.*.*` tag  → `:x.y.z` + `:x.y` + `:latest` (stable)
#   - Manual dispatch              → custom tag via input
#
# Release tags are server-scoped (`server-v*`) so widget releases don't
# churn the server image. Cut one locally with:
#
#     git tag server-v0.1.0 && git push origin server-v0.1.0

on:
  push:
    branches: [main]
    tags: ['server-v*.*.*']
    paths:
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/server-image.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra tag to apply (e.g. `rc1`). Leave blank for default.'
        required: false

concurrency:
  group: server-image-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # Hardcoded lowercase: GHCR rejects mixed-case refs and the GitHub
  # owner is `Wifsimster`.
  IMAGE_NAME: wifsimster/koe-server

jobs:
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest
    if: github.repository == 'wifsimster/koe'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      # Expose the pushed manifest digest to downstream jobs so the
      # security scan targets the exact artifact signed above, not a
      # mutable tag that might drift between jobs.
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `server-v1.2.3` → 1.2.3 + 1.2 + 1 + latest
          # `main`          → edge + latest (so Watchtower-tracked deployments auto-update)
          # commit          → sha-<short>
          # manual          → user-supplied tag
          tags: |
            type=match,pattern=server-v(\d+\.\d+\.\d+),group=1
            type=match,pattern=server-v(\d+\.\d+)\.\d+,group=1
            type=match,pattern=server-v(\d+)\.\d+\.\d+,group=1
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/server-v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=koe-server
          cache-to: type=gha,mode=max,scope=koe-server
          provenance: mode=max
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

  scan:
    name: Trivy scan
    runs-on: ubuntu-latest
    if: github.repository == 'wifsimster/koe'
    needs: build-and-push
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Run Trivy against the freshly pushed image
        # Soft-fail: the image is already pushed/signed in the preceding
        # job, so a failed scan can't un-ship it. Keep the run green so
        # an EOL-base blip doesn't page oncall; the findings still land
        # in the Security tab via the SARIF upload below.
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          # Scan the digest, not a tag. Tags are mutable and can race with
          # concurrent builds (or a re-cut `server-v*`), which would leave
          # the signed/attested digest and the scanned digest out of sync.
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.digest }}
          format: sarif
          output: trivy.sarif
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-koe-server
