name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint
        continue-on-error: true # enable hard fail once eslint is wired

      - name: Test
        run: pnpm turbo run test
        continue-on-error: true # enable hard fail once tests exist

      - name: Verify widget tarball
        working-directory: packages/widget
        run: |
          pnpm pack --pack-destination /tmp
          tar -tzf /tmp/wifsimster-koe-*.tgz | sort
