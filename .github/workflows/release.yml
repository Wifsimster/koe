name: Release

# Automated release driven by Conventional Commits + semantic-release.
#
# How it works:
#   - Every push to `main` triggers this workflow.
#   - semantic-release reads commits since the last git tag, uses the
#     Conventional Commits preset to decide the next version (`fix:` →
#     patch, `feat:` → minor, `BREAKING CHANGE:` in the body → major).
#   - If no releasable commits are present, the job is a no-op.
#   - Otherwise it publishes `@wifsimster/koe` to npm with provenance,
#     creates a git tag via the GitHub API, and opens a GitHub Release
#     with auto-generated notes.
#
# What it does NOT do:
#   - It does NOT commit CHANGELOG or version bumps back to main
#     (no `@semantic-release/git` plugin). The CHANGELOG lives on the
#     Releases page. This keeps us off the "GitHub Actions can't
#     create PRs or push to main" rails entirely.
#   - It does NOT fire on branches other than main, tags, or forks.
#
# Required secrets:
#   - NPM_TOKEN — an automation token for the `wifsimster` npm user
#     with publish rights on `@wifsimster/koe`.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository == 'wifsimster/koe'
    permissions:
      contents: write       # create tags and GitHub Releases via the API
      issues: write         # semantic-release/github may comment on issues
      pull-requests: write  # semantic-release/github may comment on PRs
      id-token: write       # npm provenance (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release needs full history to analyze commits since
          # the last tag.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Verify NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set — cannot publish."
            echo "Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm release
