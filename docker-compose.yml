# One-command self-host for Koe.
#
#   cp .env.docker.example .env
#   docker compose up -d
#   docker compose run --rm api bootstrap
#
# The `api` service runs pending migrations on start (MIGRATE_ON_START=true)
# and exposes the widget API on port 8787. Data lives in a named volume so
# `docker compose down` (without -v) preserves it.
#
# For replicas or prod deploys where you want deterministic migration
# runs, set MIGRATE_ON_START=false and run `docker compose run --rm api
# migrate` explicitly before scaling.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koe}
      POSTGRES_USER: ${POSTGRES_USER:-koe}
      # No default: unset `POSTGRES_PASSWORD` must fail compose up rather
      # than silently seeding Postgres with a predictable literal. Copy
      # `.env.docker.example` → `.env` and replace the placeholder before
      # `docker compose up`.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (copy from .env.docker.example).}
    volumes:
      - koe-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-koe} -d ${POSTGRES_DB:-koe}',
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    # Pull the published image by default. To build from source locally,
    # comment `image:` and uncomment the `build:` block.
    image: ghcr.io/wifsimster/koe-server:${KOE_SERVER_TAG:-edge}
    # build:
    #   context: .
    #   dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-koe}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (copy from .env.docker.example).}@db:5432/${POSTGRES_DB:-koe}
      PORT: 8787
      HOST: 0.0.0.0
      MIGRATE_ON_START: ${MIGRATE_ON_START:-true}
      # Dashboard is opt-in: there is no built-in auth yet, so exposing
      # `/admin/*` requires an explicit `ENABLE_DASHBOARD=true` in `.env`
      # plus your own reverse-proxy / auth in front of the port.
      ENABLE_DASHBOARD: ${ENABLE_DASHBOARD:-false}
      # Admin credentials. All three must be set in .env for the admin
      # JSON API (`/v1/admin/*`) to mount — otherwise the dashboard
      # renders but every login POST 404s because the route isn't
      # registered. Leave them unset to boot without the admin surface.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
    ports:
      - '${KOE_SERVER_PORT:-8787}:8787'
    healthcheck:
      test:
        ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:8787/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  koe-db-data:
